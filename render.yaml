services:
  - type: web
    name: physio-daily-tracker
    runtime: node
    region: frankfurt
    plan: starter
    branch: main
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
